<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="#" />
  <title>HTML Media Player with Subtitles</title>
  <style>
    #video-container {
      max-width: 600px;
      margin: 20px auto;
    }
  </style>
</head>
<body>

<div id="video-container">
  <video id="myVideo" width="100%" controls>
    <source src="https://archive.org/download/001-what-youll-get-in-this-course/001%20What%20You%27ll%20Get%20In%20This%20Course.mp4" type="video/mp4">
    <track label="English" kind="subtitles" srclang="en" src="https://archive.org/download/vedio_202401/vedio.vtt" default>
    Your browser does not support the video tag.
  </video>
</div>

<script>
  var video = document.getElementById('myVideo');
  var subtitles = video.textTracks[0];

  function toggleSubtitles() {
    if (subtitles.mode == 'showing') {
      subtitles.mode = 'hidden';
    } else {
      subtitles.mode = 'showing';
    }
  }

  // Listen for the 'loadedmetadata' event to ensure that the textTracks are available
  video.addEventListener('loadedmetadata', function() {
    // Show subtitles by default
    subtitles.mode = 'showing';
  });

</script>

</body>
</html>
