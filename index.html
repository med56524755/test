<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Video Media Player</title>
</head>
<body>
    <div id="app" class="video-container">
        <video id="videoPlayer" class="video" controls>
            <!-- Add your video source here -->
            <source src="https://ia601301.us.archive.org/30/items/0107_20240106/0107.mp4" type="video/mp4">
            
            <!-- Subtitle options -->
            <track kind="subtitles" src="med.srt" srclang="ar" label="Arabic" default>
            <track kind="subtitles" src="med.srt" srclang="en" label="English">
        </video>

        <div id="subtitleOptions" class="subtitle-options">
            <!-- Display selected subtitle -->
            Selected Subtitle: <span id="selectedSubtitle">Arabic</span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
